id: 2020_all_year
namespace: zoomcamp

description: |
  Download all months for green or yellow taxi,
  keep only one datetime column,
  and load it into PostgreSQL.

inputs:
  - id: taxi
    type: SELECT
    displayName: Select taxi type
    values: [green, yellow]
    defaults: green

  - id: year
    type: SELECT
    displayName: Select year
    values: ["2020"]
    defaults: "2020"

tasks:
  - id: if_green
    type: io.kestra.plugin.core.flow.If
    condition: "{{ inputs.taxi == 'green' }}"
    then:
      - id: drop_create_green
        type: io.kestra.plugin.jdbc.postgresql.Queries
        url: jdbc:postgresql://pgdatabase:5432/ny_taxi
        username: root
        password: root
        sql: |
          DROP TABLE IF EXISTS public.green;

          CREATE TABLE public.green (
            lpep_pickup_datetime timestamp
          );

      - id: load_green_months
        type: io.kestra.plugin.core.flow.ForEach
        values: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12"]
        tasks:
          - id: download_upload_green
            type: io.kestra.plugin.scripts.shell.Commands
            taskRunner:
              type: io.kestra.plugin.core.runner.Process
            commands:
              - |
                apt-get update
                apt-get install -y wget gzip python3 postgresql-client

                FILE="green_tripdata_{{ inputs.year }}-{{ taskrun.value }}.csv"
                URL="https://github.com/DataTalksClub/nyc-tlc-data/releases/download/green/${FILE}.gz"

                wget -qO "$FILE.gz" "$URL"
                gunzip -f "$FILE.gz"

                python3 << 'PY'
                import csv

                file_name = "green_tripdata_{{ inputs.year }}-{{ taskrun.value }}.csv"

                with open(file_name, newline="", encoding="utf-8") as f, open("green_one_column.csv", "w", newline="", encoding="utf-8") as out:
                    reader = csv.DictReader(f)
                    writer = csv.writer(out)

                    writer.writerow(["lpep_pickup_datetime"])

                    for row in reader:
                        writer.writerow([
                            row.get("lpep_pickup_datetime")
                        ])
                PY

                export PGPASSWORD=root

                psql -h pgdatabase -p 5432 -U root -d ny_taxi << 'SQL'
                \copy public.green(lpep_pickup_datetime) FROM 'green_one_column.csv' WITH CSV HEADER
                SQL

  - id: if_yellow
    type: io.kestra.plugin.core.flow.If
    condition: "{{ inputs.taxi == 'yellow' }}"
    then:
      - id: drop_create_yellow
        type: io.kestra.plugin.jdbc.postgresql.Queries
        url: jdbc:postgresql://pgdatabase:5432/ny_taxi
        username: root
        password: root
        sql: |
          DROP TABLE IF EXISTS public.yellow;

          CREATE TABLE public.yellow (
            tpep_pickup_datetime timestamp
          );

      - id: load_yellow_months
        type: io.kestra.plugin.core.flow.ForEach
        values: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12"]
        tasks:
          - id: download_upload_yellow
            type: io.kestra.plugin.scripts.shell.Commands
            taskRunner:
              type: io.kestra.plugin.core.runner.Process
            commands:
              - |
                apt-get update
                apt-get install -y wget gzip python3 postgresql-client

                FILE="yellow_tripdata_{{ inputs.year }}-{{ taskrun.value }}.csv"
                URL="https://github.com/DataTalksClub/nyc-tlc-data/releases/download/yellow/${FILE}.gz"

                wget -qO "$FILE.gz" "$URL"
                gunzip -f "$FILE.gz"

                python3 << 'PY'
                import csv

                file_name = "yellow_tripdata_{{ inputs.year }}-{{ taskrun.value }}.csv"

                with open(file_name, newline="", encoding="utf-8") as f, open("yellow_one_column.csv", "w", newline="", encoding="utf-8") as out:
                    reader = csv.DictReader(f)
                    writer = csv.writer(out)

                    writer.writerow(["tpep_pickup_datetime"])

                    for row in reader:
                        writer.writerow([
                            row.get("tpep_pickup_datetime")
                        ])
                PY

                export PGPASSWORD=root

                psql -h pgdatabase -p 5432 -U root -d ny_taxi << 'SQL'
                \copy public.yellow(tpep_pickup_datetime) FROM 'yellow_one_column.csv' WITH CSV HEADER
                SQL